name: Android Build Setup
description: Set up JDK, Android SDK, and Gradle cache for an Android build job.

inputs:
  java-version:
    description: JDK version to install
    default: '17'
  java-distribution:
    description: JDK distribution (e.g. temurin, zulu)
    default: 'temurin'
  sdk-version:
    description: Android SDK platform version
    default: '36'
  build-tools-version:
    description: Android build-tools version
    default: '35.0.0'

runs:
  using: composite
  steps:
    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version:  ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK platform and build tools
      shell: bash
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-${{ inputs.sdk-version }}"
        sdkmanager "build-tools;${{ inputs.build-tools-version }}"

    - name: Export SDK paths
      shell: bash
      run: |
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT"     >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

    - name: Make gradlew executable
      shell: bash
      run: chmod +x gradlew
